# 🌸 SakLinux Tmux Config

# Status bar
set -g status-style 'bg=#1a1a2e fg=#FFB7C5'
set -g status-left '#[fg=#FF1493]🌸 SakLinux '
set -g status-right '#[fg=#FF69B4]%H:%M #[fg=#FFB7C5]%d-%b-%y'
set -g status-left-length 20
set -g status-right-length 40

# Window status
setw -g window-status-current-style 'fg=#FF1493 bold'
setw -g window-status-current-format ' #I:#W '

# Pane borders
set -g pane-border-style 'fg=#C71585'
set -g pane-active-border-style 'fg=#FF69B4'

# Mode
setw -g mode-style 'bg=#FF69B4 fg=#1a1a2e'

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display "🌸 Config reloaded!"

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Vi mode
setw -g mode-keys vi
